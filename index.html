<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE 21일 학습 트래커</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; margin: 0; padding: 16px; color: #333; }
.container { max-width: 980px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); padding: 28px; }
h1 { margin: 0 0 4px; color: #4a3b8c; font-size: 24px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 18px; }
.start-banner { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; padding: 14px 18px; border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.start-banner.hide { display: none; }
.start-banner input[type="date"] { padding: 6px 10px; border: none; border-radius: 6px; font-size: 13px; }
.start-banner button { padding: 8px 14px; background: #fff; color: #f97316; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; }
.overall-progress { background: #f7f8fc; padding: 14px 18px; border-radius: 10px; margin-bottom: 16px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.progress-stat { font-size: 13px; color: #555; }
.progress-stat strong { font-size: 16px; color: #4a3b8c; display: block; }
.progress-bar { flex: 1; min-width: 200px; height: 8px; background: #e0e7ff; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
.day-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; padding: 10px; background: #fafafa; border-radius: 10px; }
.day-btn { width: 36px; height: 36px; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
.day-btn:hover { background: #eef0ff; border-color: #667eea; }
.day-btn.today { background: #f59e0b; color: #fff; border-color: #f59e0b; }
.day-btn.active { background: #667eea; color: #fff; border-color: #667eea; }
.day-btn.done { background: #d1fae5; border-color: #10b981; }
.day-btn.done.active { background: #667eea; color: #fff; }
.day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.day-num { font-size: 22px; font-weight: 700; color: #4a3b8c; }
.day-date { font-size: 13px; color: #888; }
.day-status { margin-left: auto; display: flex; gap: 6px; }
.tag { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.tag.today { background: #fef3c7; color: #92400e; }
.tag.upcoming { background: #e0e7ff; color: #4338ca; }
.tag.past { background: #fee2e2; color: #991b1b; }
.tag.done { background: #d1fae5; color: #065f46; }
.section { background: #fafbff; border-radius: 10px; padding: 16px; margin-bottom: 14px; border-left: 4px solid #667eea; }
.section.rs { border-left-color: #f59e0b; }
.section.review { border-left-color: #10b981; }
.section.mock { border-left-color: #ef4444; background: #fef2f2; }
.section.checker { border-left-color: #8b5cf6; background: #faf5ff; }
.section-title { font-weight: 700; color: #4a3b8c; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.section.rs .section-title { color: #92400e; }
.section.review .section-title { color: #065f46; }
.section.mock .section-title { color: #991b1b; }
.section.checker .section-title { color: #6d28d9; }
.section-count { font-size: 12px; font-weight: 600; background: #fff; padding: 3px 9px; border-radius: 12px; color: #888; }
.sentence-item { background: #fff; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; font-size: 14px; line-height: 1.4; cursor: pointer; transition: background 0.1s; }
.sentence-item:hover { background: #f0f3ff; }
.sentence-item.checked { background: #f0fdf4; text-decoration: line-through; color: #999; }
.sentence-checkbox { width: 18px; height: 18px; border: 2px solid #ddd; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: transparent; cursor: pointer; margin-top: 1px; }
.sentence-item.checked .sentence-checkbox { background: #10b981; border-color: #10b981; color: #fff; }
.sentence-num { font-weight: 700; color: #667eea; font-size: 12px; min-width: 28px; text-align: right; }
.section.rs .sentence-num { color: #f59e0b; }
.sentence-text { flex: 1; }
.sentence-ko { font-size: 12px; color: #888; font-style: italic; margin-top: 3px; display: none; }
.sentence-item.expanded .sentence-ko { display: block; }
.sentence-actions { display: flex; gap: 6px; flex-shrink: 0; }
.mini-btn { padding: 3px 8px; font-size: 11px; background: #fff; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; color: #666; text-decoration: none; }
.mini-btn:hover { background: #f0f3ff; border-color: #667eea; color: #4338ca; }
.mini-btn.play { background: #ff0000; color: #fff; border-color: #ff0000; }
.mini-btn.play:hover { background: #cc0000; }
.review-list { display: flex; gap: 8px; flex-wrap: wrap; }
.review-link { padding: 6px 12px; background: #fff; border: 1px solid #d1fae5; border-radius: 6px; font-size: 13px; cursor: pointer; color: #065f46; }
.review-link:hover { background: #ecfdf5; }
.checker-yt-btn { display: inline-block; padding: 8px 14px; background: #ff0000; color: #fff; font-size: 13px; border-radius: 6px; text-decoration: none; font-weight: 600; margin-bottom: 12px; }
.checker-yt-btn:hover { background: #cc0000; }
.checker-input { width: 100%; min-height: 90px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: inherit; resize: vertical; line-height: 1.5; }
.checker-input:focus { outline: none; border-color: #8b5cf6; }
.checker-hint { font-size: 12px; color: #999; margin: 4px 0 10px; }
.checker-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-purple { background: #8b5cf6; color: #fff; border: none; padding: 10px 18px; border-radius: 7px; font-weight: 600; cursor: pointer; font-size: 13px; }
.btn-purple:hover { background: #7c3aed; }
.btn-amber { background: #f59e0b; color: #fff; border: none; padding: 10px 18px; border-radius: 7px; font-weight: 600; cursor: pointer; font-size: 13px; }
.btn-amber:hover { background: #d97706; }
.btn-gray { background: #fff; color: #6b7280; border: 2px solid #d1d5db; padding: 8px 14px; border-radius: 7px; font-weight: 600; cursor: pointer; font-size: 13px; }
.btn-gray:hover { background: #f3f4f6; }
.checker-result { margin-top: 12px; padding: 14px; background: #fff; border-radius: 8px; display: none; }
.checker-result.show { display: block; }
.match-info { background: #ede9fe; color: #5b21b6; padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 10px; }
.score-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.score-tag { padding: 5px 14px; border-radius: 16px; font-weight: 700; font-size: 15px; }
.score-tag.high { background: #d1fae5; color: #065f46; }
.score-tag.mid { background: #fef3c7; color: #92400e; }
.score-tag.low { background: #fee2e2; color: #991b1b; }
.diff-display { font-size: 16px; line-height: 1.8; padding: 12px; background: #fafbff; border-radius: 6px; word-spacing: 2px; }
.word-correct { background: #d1fae5; color: #065f46; padding: 2px 5px; border-radius: 3px; margin: 0 1px; }
.word-wrong { background: #ef4444; color: #fff; padding: 2px 5px; border-radius: 3px; margin: 0 1px; font-weight: 700; }
.word-missing { background: #fef3c7; color: #92400e; padding: 2px 5px; border-radius: 3px; margin: 0 1px; border: 1px dashed #d97706; }
.answer-show { margin-top: 10px; padding: 10px 12px; background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 4px; display: none; }
.answer-show.show { display: block; }
.answer-show .lbl { font-size: 11px; color: #92400e; font-weight: 700; margin-bottom: 4px; }
.answer-show .en { font-size: 15px; color: #333; }
.answer-show .ko { font-size: 13px; color: #6b7280; font-style: italic; margin-top: 5px; padding-top: 5px; border-top: 1px solid #fef3c7; }
.no-match-msg { background: #fee2e2; color: #991b1b; padding: 10px 12px; border-radius: 6px; font-size: 13px; }
.tools-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.tool-btn { flex: 1; min-width: 130px; padding: 12px; background: #fff; border: 2px solid #667eea; border-radius: 8px; color: #667eea; font-weight: 600; text-decoration: none; text-align: center; cursor: pointer; font-size: 13px; }
.tool-btn:hover { background: #f0f3ff; }
.tool-btn.yt { background: #ff0000; color: #fff; border-color: #ff0000; }
.tool-btn.yt:hover { background: #cc0000; }
.reset-row { display: flex; justify-content: flex-end; margin-top: 14px; }
.reset-btn { padding: 6px 12px; font-size: 12px; background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 6px; cursor: pointer; }
.reset-btn:hover { background: #fee2e2; }
.mock-content { font-size: 14px; line-height: 1.7; color: #555; }
.mock-content ul { padding-left: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>📚 PTE 21일 학습 트래커</h1>
  <div class="subtitle">WFD 250문장 + RS 134문장 · 듣기 + 채점 모두 한 페이지에서</div>

  <div class="start-banner" id="start-banner">
    <span>📅 학습 시작일을 설정하세요:</span>
    <input type="date" id="start-date-input">
    <button id="set-start">시작!</button>
    <span style="font-size:12px;opacity:0.9;">(이미 시작했다면 시작했던 날짜 선택)</span>
  </div>

  <div class="overall-progress">
    <div class="progress-stat">📅 <strong id="stat-day">-</strong>일차</div>
    <div class="progress-stat">✅ <strong id="stat-checked">0</strong>개 완료</div>
    <div class="progress-stat">📊 <strong id="stat-pct">0%</strong></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="day-nav" id="day-nav"></div>

  <div id="day-content"></div>

  <div class="section checker">
    <div class="section-title">
      <span>✔ WFD 채점기 (250문장 자동 매칭)</span>
      <span class="section-count">바로 사용</span>
    </div>
    <a class="checker-yt-btn" href="https://www.youtube.com/watch?v=VUsBUU48nWk" target="_blank">▶ WFD YouTube 전체 영상 열기</a>
    <textarea class="checker-input" id="checker-input" placeholder="WFD 영상에서 들으신 문장을 타이핑하세요. Enter: 채점 / Shift+Enter: 줄바꿈"></textarea>
    <div class="checker-hint">⌨️ Enter: 채점하기 · 250문장 중 자동 매칭해서 채점합니다</div>
    <div class="checker-actions">
      <button class="btn-purple" id="btn-check">✔ 채점하기</button>
      <button class="btn-amber" id="btn-answer">👁 정답 확인</button>
      <button class="btn-gray" id="btn-clear">지우기</button>
    </div>
    <div class="checker-result" id="checker-result"></div>
    <div class="answer-show" id="answer-show"></div>
  </div>

  <div class="tools-row">
    <a class="tool-btn yt" href="https://www.youtube.com/watch?v=VUsBUU48nWk" target="_blank">▶ WFD YouTube</a>
    <a class="tool-btn yt" href="https://www.youtube.com/watch?v=A6MW5ehdLBs" target="_blank">▶ RS YouTube</a>
    <a class="tool-btn" href="https://gopte.co/wfd/129" target="_blank">📖 GoPTE WFD</a>
    <a class="tool-btn" href="https://gopte.co/rs/131" target="_blank">📖 GoPTE RS</a>
  </div>

  <div class="reset-row">
    <button class="reset-btn" id="reset-btn">🔄 진도 초기화</button>
  </div>
</div>

<script>

var WFD = [["The celebrated theory is still the source of great controversy.", "이 유명한 이론은 여전히 큰 논란의 대상이 되고 있습니다."], ["A good architectural structure should be useful, durable and beautiful.", "좋은 건축 구조는 유용하고 내구성이 뛰어나며 아름다워야 합니다."], ["A group meeting will be held tomorrow in the library conference room.", "내일 도서관 회의실에서 그룹 회의가 열립니다."], ["Educational level is found to be related to social and economic background.", "교육 수준은 사회적, 경제적 배경과 관련이 있는 것으로 나타났습니다."], ["We can all meet at my office after the lecture.", "강의가 끝난 후 우리 사무실에서 모두 만날 수 있어요."], ["Tutorials are scheduled in the final week of the term.", "튜토리얼은 학기 마지막 주에 예정되어 있습니다."], ["You can make an appointment to meet the librarian.", "사서 선생님을 만나기 위해 예약을 할 수 있습니다."], ["All dissertations must be accompanied by a submission form.", "모든 논문에는 제출 양식이 첨부되어야 합니다."], ["All of the assignments must be submitted in person to the faculty office.", "모든 과제는 교직원 사무실에 직접 제출해야 합니다."], ["Economic development needs to be supported by the government.", "경제 발전은 정부의 지원이 필요합니다."], ["The toughest part of postgraduate education is funding.", "대학원 교육에서 가장 어려운 부분은 자금 조달입니다."], ["Our view is that educational reforms have been inadequately implemented.", "우리의 견해는 교육 개혁이 부적절하게 시행되었다는 것입니다."], ["An introduction is an essential element of presentation.", "소개는 프레젠테이션의 필수 요소입니다."], ["The assignments should be submitted to the department office before the deadlines.", "과제는 마감일 전에 부서 사무실에 제출해야 합니다."], ["Before attending classes, you must register online or by post.", "수업에 참석하기 전에 온라인 또는 우편으로 등록해야 합니다."], ["Certain scientific principles must be learned verbally or by logical deduction.", "특정 과학 원리는 구두로 또는 논리적 추론을 통해 학습해야 합니다."], ["Consumer confidence has a direct influence on sales.", "소비자 신뢰는 매출에 직접적인 영향을 미칩니다."], ["Daily practice can build confidence and improve skills.", "매일 연습하면 자신감을 키우고 기술을 향상시킬 수 있습니다."], ["The economic status of the early Roman Republic will be examined.", "초기 로마 공화국의 경제 상황을 살펴볼 것입니다."], ["Human beings compete with other living thi     s.new_rs.forEach(function(idx) {
      html += renderSentenceItem('rs', currentDay, idx, RS[idx], '');
    });
    html += '</div>';
  }

  if (s.review_days && s.review_days.length > 0) {
    html += '<div class="section review">' +
      '<div class="section-title">' +
        '<span>🔁 복습 (스페이스드 리피티션)</span>' +
        '<span class="section-count">' + s.review_days.length + '일치</span>' +
      '</div>' +
      '<div class="review-list">';
    s.review_days.forEach(function(rd) {
      var diff = currentDay - rd;
      var label = diff === 1 ? '어제 (Day ' + rd + ')' : diff + '일 전 (Day ' + rd + ')';
      html += '<button class="review-link" data-review="' + rd + '">' + label + '</button>';
    });
    html += '</div>' +
    '<div style="font-size:12px;color:#666;margin-top:10px;">📌 위 일자 버튼 클릭 → 그 날의 문장으로 이동. 빠르게 한 번씩 듣고 외워보세요.</div>' +
    '</div>';
  }

  container.innerHTML = html;
  bindSentenceClicks(container);
  Array.from(container.querySelectorAll('.review-link')).forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentDay = parseInt(btn.dataset.review);
      renderDayNav();
      renderDayContent();
      window.scrollTo({top: 0, behavior: 'smooth'});
    });
  });
}

function updateProgress() {
  var totalAll = 250 + 134;
  var checkedAll = 0;
  Object.keys(state.checks).forEach(function(day) {
    if (state.checks[day].wfd) checkedAll += Object.keys(state.checks[day].wfd).length;
    if (state.checks[day].rs) checkedAll += Object.keys(state.checks[day].rs).length;
  });
  document.getElementById('stat-checked').textContent = checkedAll;
  var pct = Math.round(checkedAll / totalAll * 100);
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  var today = getTodayDay();
  document.getElementById('stat-day').textContent = today ? Math.min(Math.max(today,1),21) : '-';
}

function normalize(t) { return t.toLowerCase().replace(/[^a-z0-9\s\x27]/g, ' ').replace(/\s+/g, ' ').trim(); }
function tokenize(t) { var n = normalize(t); if (!n) return []; return n.split(' ').filter(function(x) { return x.length > 0; }); }
function diffWords(o, u) {
  var m = o.length, n = u.length;
  var dp = [];
  for (var i = 0; i <= m; i++) dp.push(new Array(n + 1).fill(0));
  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      if (o[i-1] === u[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  var ops = []; var i2 = m, j2 = n;
  while (i2 > 0 && j2 > 0) {
    if (o[i2-1] === u[j2-1]) { ops.unshift({type:'match', w:o[i2-1]}); i2--; j2--; }
    else if (dp[i2-1][j2] >= dp[i2][j2-1]) { ops.unshift({type:'missing', w:o[i2-1]}); i2--; }
    else { ops.unshift({type:'extra', w:u[j2-1]}); j2--; }
  }
  while (i2 > 0) { ops.unshift({type:'missing', w:o[i2-1]}); i2--; }
  while (j2 > 0) { ops.unshift({type:'extra', w:u[j2-1]}); j2--; }
  return { ops: ops, lcs: dp[m][n] };
}
function findBestMatch(userWords) {
  var bestIdx = -1, bestScore = -1;
  for (var i = 0; i < WFD.length; i++) {
    var sw = tokenize(WFD[i][0]);
    var r = diffWords(sw, userWords);
    var denom = Math.max(sw.length, userWords.length);
    var score = denom > 0 ? r.lcs / denom : 0;
    if (score > bestScore) { bestScore = score; bestIdx = i; }
  }
  return { idx: bestIdx, score: bestScore };
}

function checkAnswer() {
  var userText = document.getElementById('checker-input').value.trim();
  var resultEl = document.getElementById('checker-result');
  var answerEl = document.getElementById('answer-show');
  answerEl.classList.remove('show');
  if (!userText) { alert('타이핑한 내용을 입력하세요!'); return; }
  var userWords = tokenize(userText);
  if (userWords.length === 0) { alert('영어 단어를 입력하세요!'); return; }
  var match = findBestMatch(userWords);
  lastMatchIdx = match.idx;
  if (match.score < 0.2) {
    resultEl.innerHTML = '<div class="no-match-msg">⚠️ 250문장 중 일치 문장 없음 (최대 ' + Math.round(match.score*100) + '%). 다시 들어보세요.</div>';
    resultEl.classList.add('show');
    return;
  }
  var matchedEn = WFD[match.idx][0];
  var ow = tokenize(matchedEn);
  var r = diffWords(ow, userWords);
  var acc = ow.length > 0 ? Math.round((r.lcs / ow.length) * 100) : 0;
  var sc = acc >= 80 ? 'high' : acc >= 50 ? 'mid' : 'low';
  var diffHtml = '';
  r.ops.forEach(function(op) {
    if (op.type === 'match') diffHtml += '<span class="word-correct">' + escapeHtml(op.w) + '</span>';
    else if (op.type === 'missing') diffHtml += '<span class="word-missing">' + escapeHtml(op.w) + '</span>';
    else diffHtml += '<span class="word-wrong">' + escapeHtml(op.w) + '</span>';
  });
  var correct = r.ops.filter(function(x) { return x.type === 'match'; }).length;
  var missing = r.ops.filter(function(x) { return x.type === 'missing'; }).length;
  var extra = r.ops.filter(function(x) { return x.type === 'extra'; }).length;
  var msg = acc === 100 ? '🎉 완벽!' : acc >= 90 ? '✨ 거의 완벽!' : acc >= 70 ? '👍 잘했어요' : acc >= 50 ? '💪 조금 더!' : '📚 다시!';
  resultEl.innerHTML =
    '<div class="match-info">🔍 매칭: <strong>WFD #' + (match.idx+1) + '</strong> · 일치율 ' + Math.round(match.score*100) + '%</div>' +
    '<div class="score-line"><div style="font-weight:700;color:#4a3b8c;">📊 ' + msg + '</div><span class="score-tag ' + sc + '">' + acc + '점</span></div>' +
    '<div class="diff-display">' + diffHtml + '</div>' +
    '<div style="display:flex;gap:14px;margin-top:8px;font-size:12px;color:#666;flex-wrap:wrap;">' +
      '<span>✅ ' + correct + '/' + ow.length + '</span>' +
      '<span>⚠️ 누락 ' + missing + '</span>' +
      '<span>❌ 틀림 ' + extra + '</span>' +
    '</div>';
  resultEl.classList.add('show');
}

function showAnswer() {
  if (lastMatchIdx < 0) {
    var userText = document.getElementById('checker-input').value.trim();
    if (!userText) { alert('먼저 들으신 문장을 일부라도 타이핑하세요.'); return; }
    var uw = tokenize(userText);
    if (uw.length === 0) { alert('영어 단어를 입력하세요!'); return; }
    var match = findBestMatch(uw);
    if (match.score < 0.15) { alert('일치 문장을 찾을 수 없습니다.'); return; }
    lastMatchIdx = match.idx;
  }
  var answerEl = document.getElementById('answer-show');
  answerEl.innerHTML =
    '<div class="lbl">💡 정답 (WFD #' + (lastMatchIdx + 1) + ')</div>' +
    '<div class="en">' + escapeHtml(WFD[lastMatchIdx][0]) + '</div>' +
    '<div class="ko">🇰🇷 ' + escapeHtml(WFD[lastMatchIdx][1]) + '</div>';
  answerEl.classList.add('show');
  answerEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function clearChecker() {
  document.getElementById('checker-input').value = '';
  document.getElementById('checker-result').classList.remove('show');
  document.getElementById('answer-show').classList.remove('show');
  lastMatchIdx = -1;
  document.getElementById('checker-input').focus();
}

function init() {
  if (state.startDate) {
    document.getElementById('start-banner').classList.add('hide');
    var today = getTodayDay();
    if (today && today >= 1 && today <= 21) currentDay = today;
    else if (today && today > 21) currentDay = 21;
    else currentDay = 1;
  } else {
    document.getElementById('start-date-input').value = formatDate(new Date());
  }
  renderDayNav();
  renderDayContent();
  updateProgress();
}

document.getElementById('set-start').addEventListener('click', function() {
  var v = document.getElementById('start-date-input').value;
  if (!v) { alert('날짜를 선택하세요'); return; }
  state.startDate = v;
  saveState();
  document.getElementById('start-banner').classList.add('hide');
  init();
});

document.getElementById('reset-btn').addEventListener('click', function() {
  if (confirm('정말 모든 진도와 시작일을 초기화하시겠습니까?')) {
    state = {startDate:null, checks:{}};
    saveState();
    location.reload();
  }
});

document.getElementById('btn-check').addEventListener('click', checkAnswer);
document.getElementById('btn-answer').addEventListener('click', showAnswer);
document.getElementById('btn-clear').addEventListener('click', clearChecker);
document.getElementById('checker-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    checkAnswer();
  }
});

init();

</script>
