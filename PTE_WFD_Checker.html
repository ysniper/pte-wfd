<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE WFD 받아쓰기 채점기</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  color: #333;
}
.container {
  max-width: 880px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  padding: 32px;
}
h1 { margin: 0 0 6px; color: #4a3b8c; font-size: 24px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 22px; }
.subtitle a { color: #667eea; }

.yt-btn {
  display: inline-block;
  padding: 10px 18px;
  background: #ff0000;
  color: #fff;
  font-size: 14px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  margin-bottom: 18px;
}
.yt-btn:hover { background: #cc0000; }

.label {
  font-weight: 700;
  color: #4a3b8c;
  font-size: 13px;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

textarea {
  width: 100%;
  min-height: 120px;
  padding: 16px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 17px;
  font-family: inherit;
  resize: vertical;
  line-height: 1.5;
}
textarea:focus { outline: none; border-color: #667eea; }

.hint {
  font-size: 12px;
  color: #999;
  margin-top: 6px;
}

.action-row {
  display: flex;
  gap: 10px;
  margin: 16px 0;
  flex-wrap: wrap;
}
button {
  padding: 12px 22px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.15s;
}
.btn-primary { background: #667eea; color: #fff; }
.btn-primary:hover { background: #5568d3; }
.btn-warning { background: #f59e0b; color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-secondary { background: #fff; color: #667eea; border: 2px solid #667eea; }
.btn-secondary:hover { background: #eef0ff; }

.result {
  padding: 20px;
  background: #f7f8fc;
  border-radius: 12px;
  display: none;
  margin-top: 14px;
}
.result.show { display: block; }

.matched-info {
  background: #e0e7ff;
  color: #4338ca;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 14px;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.result-title { font-weight: 700; color: #4a3b8c; font-size: 16px; }
.score {
  display: inline-block;
  padding: 6px 18px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 17px;
}
.score.high { background: #d1fae5; color: #065f46; }
.score.mid { background: #fef3c7; color: #92400e; }
.score.low { background: #fee2e2; color: #991b1b; }

.diff-label {
  font-size: 12px;
  color: #4a3b8c;
  font-weight: 700;
  margin: 10px 0 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.diff-line {
  font-size: 17px;
  line-height: 1.9;
  padding: 14px;
  background: #fff;
  border-radius: 8px;
  margin-bottom: 10px;
  word-spacing: 2px;
}
.word-correct { background: #d1fae5; color: #065f46; padding: 2px 6px; border-radius: 4px; margin: 0 2px; }
.word-wrong { background: #ef4444; color: #fff; padding: 2px 6px; border-radius: 4px; margin: 0 2px; font-weight: 700; }
.word-missing { background: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; margin: 0 2px; border: 1px dashed #d97706; }

.stats-line {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: #555;
  margin-top: 10px;
  flex-wrap: wrap;
}

.answer-reveal {
  background: #fff;
  border-left: 4px solid #f59e0b;
  padding: 14px 16px;
  border-radius: 6px;
  margin-top: 16px;
  display: none;
}
.answer-reveal.show { display: block; }
.answer-reveal .ar-label {
  font-size: 12px;
  color: #92400e;
  font-weight: 700;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.answer-en {
  font-size: 17px;
  line-height: 1.5;
  color: #333;
  margin-bottom: 8px;
}
.answer-ko {
  font-size: 14px;
  line-height: 1.5;
  color: #6b7280;
  font-style: italic;
  padding-top: 8px;
  border-top: 1px solid #fef3c7;
}

.legend {
  display: flex;
  gap: 14px;
  font-size: 12px;
  margin-top: 14px;
  color: #666;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-color { display: inline-block; width: 14px; height: 14px; border-radius: 3px; }

.no-match {
  background: #fee2e2;
  color: #991b1b;
  padding: 14px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <h1>PTE WFD 받아쓰기 채점기</h1>
  <div class="subtitle">
    <a href="https://gopte.co/wfd/129" target="_blank">GoPTE Week 19 (5/7~5/13)</a>의 250문장 내장 ·
    <a href="https://www.youtube.com/watch?v=VUsBUU48nWk" target="_blank">YouTube 영상</a>에서 듣고 타이핑하면 자동으로 문제를 찾아 채점합니다
  </div>

  <a class="yt-btn" href="https://www.youtube.com/watch?v=VUsBUU48nWk" target="_blank">▶ YouTube 영상 열기 (새 창)</a>

  <div class="label">들으신 문장을 타이핑하세요</div>
  <textarea id="user-input" placeholder="여기에 타이핑 후 Enter 키 (줄바꿈은 Shift+Enter)" autofocus></textarea>
  <div class="hint">⌨️ Enter: 채점하기 · Shift+Enter: 줄바꿈</div>

  <div class="action-row">
    <button class="btn-primary" id="btn-check">✔ 채점하기</button>
    <button class="btn-warning" id="btn-answer">👁 정답 확인</button>
    <button class="btn-secondary" id="btn-clear">지우기</button>
  </div>

  <div class="result" id="result"></div>
  <div class="answer-reveal" id="answer-reveal"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-color" style="background:#d1fae5"></span>맞은 단어</div>
    <div class="legend-item"><span class="legend-color" style="background:#ef4444"></span>틀린 단어</div>
    <div class="legend-item"><span class="legend-color" style="background:#fef3c7;border:1px dashed #d97706"></span>누락된 단어</div>
  </div>
</div>

<script>
var SENTENCES = [["The celebrated theory is still the source of great controversy.", "이 유명한 이론은 여전히 큰 논란의 대상이 되고 있습니다."], ["A good architectural structure should be useful, durable and beautiful.", "좋은 건축 구조는 유용하고 내구성이 뛰어나며 아름다워야 합니다."], ["A group meeting will be held tomorrow in the library conference room.", "내일 도서관 회의실에서 그룹 회의가 열립니다."], ["Educational level is found to be related to social and economic background.", "교육 수준은 사회적, 경제적 배경과 관련이 있는 것으로 나타났습니다."], ["We can all meet at my office after the lecture.", "강의가 끝난 후 우리 사무실에서 모두 만날 수 있어요."], ["Tutorials are scheduled in the final week of the term.", "튜토리얼은 학기 마지막 주에 예정되어 있습니다."], ["You can make an appointment to meet the librarian.", "사서 선생님을 만나기 위해 예약을 할 수 있습니다."], ["All dissertations must be accompanied by a submission form.", "모든 논문에는 제출 양식이 첨부되어야 합니다."], ["All of the assignments must be submitted in person to the faculty office.", "모든 과제는 교직원 사무실에 직접 제출해야 합니다."], ["Economic development needs to be supported by the government.", "경제 발전은 정부의 지원이 필요합니다."], ["The toughest part of postgraduate education is funding.", "대학원 교육에서 가장 어려운 부분은 자금 조달입니다."], ["Our view is that educational reforms have been inadequately implemented.", "우리의 견해는 교육 개혁이 부적절하게 시행되었다는 것입니다."], ["An introduction is an essential element of presentation.", "소개는 프레젠테이션의 필수 요소입니다."], ["The assignments should be submitted to the department office before the deadlines.", "과제는 마감일 전에 부서 사무실에 제출해야 합니다."], ["Before attending classes, you must register online or by post.", "수업에 참석하기 전에 온라인 또는 우편으로 등록해야 합니다."], ["Certain scientific principles must be learned verbally or by logical deduction.", "특정 과학 원리는 구두로 또는 논리적 추론을 통해 학습해야 합니다."], ["Consumer confidence has a direct influence on sales.", "소비자 신뢰는 매출에 직접적인 영향을 미칩니다."], ["Daily practice can build confidence and improve skills.", "매일 연습하면 자신감을 키우고 기술을 향상시킬 수 있습니다."], ["The economic status of the early Roman Republic will be examined.", "초기 로마 공화국의 경제 상황을 살펴볼 것입니다."], ["Human beings compete with other living things for resources and space.", "인간은 자원과 공간을 놓고 다른 생명체와 경쟁합니다."], ["Good research delivers practical benefits for real people.", "좋은 연구는 실제 사람들에게 실질적인 혜택을 제공합니다."], ["He landed a job in a very prestigious law firm.", "그는 매우 명망 있는 로펌에 취직했습니다."], ["The lecture is about the reasons for the financial crisis.", "강의는 금융 위기의 원인에 관한 것입니다."], ["I thought it was through the small meeting room.", "작은 회의실을 통해서인 줄 알았습니다."], ["If finance is a cause of concern, scholarships may be available.", "재정적인 문제가 우려되는 경우 장학금을 받을 수 있습니다."], ["If you need additional help, visit the student resource center.", "추가 도움이 필요하면 학생 리소스 센터를 방문하세요."], ["Important details from the argument are missing in the summary.", "주장의 중요한 세부 사항이 요약에 누락되어 있습니다."], ["It may not be possible to solve the problem easily.", "문제를 쉽게 해결하지 못할 수도 있습니다."], ["Library reference desks hold a lot of materials on academic history.", "도서관 자료실에는 학술 역사에 관한 많은 자료가 있습니다."], ["Listening is the key skill needed to succeed in this course.", "경청은 이 과정에서 성공하는 데 필요한 핵심 기술입니다."], ["Medical researchers have focused on causes of diseases and treatments.", "의학 연구자들은 질병의 원인과 치료법에 집중해 왔습니다."], ["Organizational failure is considered from various perspectives in academic literature.", "조직의 실패는 학술 문헌에서 다양한 관점에서 고려됩니다."], ["Plants are the living things that can grow on land or in water.", "식물은 육지나 물에서 자랄 수 있는 생명체입니다."], ["Please make sure you have correctly cited all the necessary materials.", "필요한 모든 자료를 올바르게 인용했는지 확인하세요."], ["Public perception about biotechnology is crucial for developing scientific consensus.", "생명공학에 대한 대중의 인식은 과학적 공감대를 형성하는 데 매우 중요합니다."], ["Remember, the prestigious election of stewardship has strict eligibility criteria.", "기억하세요, 권위 있는 지도자 선출은 엄격한 자격 기준이 있습니다."], ["Resources and materials are on hold at the library reference desk.", "리소스와 자료는 도서관 참고 데스크에 보관되어 있습니다."], ["Many departments have their own special book collections.", "많은 부서에서 자체적으로 특별한 도서 컬렉션을 보유하고 있습니다."], ["Some economists argue that the entire financial sys function normalize(t) {
  return t.toLowerCase().replace(/[^a-z0-9\s']/g, ' ').replace(/\s+/g, ' ').trim();
}

function tokenize(t) {
  var n = normalize(t);
  if (!n) return [];
  return n.split(' ').filter(function(x) { return x.length > 0; });
}

function diffWords(o, u) {
  var m = o.length, n = u.length;
  var dp = [];
  for (var i = 0; i <= m; i++) {
    dp.push(new Array(n + 1).fill(0));
  }
  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      if (o[i-1] === u[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  var ops = [];
  var i2 = m, j2 = n;
  while (i2 > 0 && j2 > 0) {
    if (o[i2-1] === u[j2-1]) {
      ops.unshift({type:'match', w:o[i2-1]});
      i2--; j2--;
    } else if (dp[i2-1][j2] >= dp[i2][j2-1]) {
      ops.unshift({type:'missing', w:o[i2-1]});
      i2--;
    } else {
      ops.unshift({type:'extra', w:u[j2-1]});
      j2--;
    }
  }
  while (i2 > 0) { ops.unshift({type:'missing', w:o[i2-1]}); i2--; }
  while (j2 > 0) { ops.unshift({type:'extra', w:u[j2-1]}); j2--; }
  return { ops: ops, lcs: dp[m][n] };
}

function findBestMatch(userWords) {
  var bestIdx = -1;
  var bestScore = -1;
  for (var i = 0; i < SENTENCES.length; i++) {
    var sentWords = tokenize(SENTENCES[i][0]);
    var r = diffWords(sentWords, userWords);
    var denom = Math.max(sentWords.length, userWords.length);
    var score = denom > 0 ? r.lcs / denom : 0;
    if (score > bestScore) {
      bestScore = score;
      bestIdx = i;
    }
  }
  return { idx: bestIdx, score: bestScore };
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function checkAnswer() {
  var userText = document.getElementById('user-input').value.trim();
  var resultEl = document.getElementById('result');
  var answerEl = document.getElementById('answer-reveal');
  answerEl.classList.remove('show');

  if (!userText) {
    alert('타이핑한 내용을 입력하세요!');
    return;
  }

  var userWords = tokenize(userText);
  if (userWords.length === 0) {
    alert('영어 단어를 입력하세요!');
    return;
  }

  var match = findBestMatch(userWords);
  lastMatchIdx = match.idx;

  if (match.score < 0.2) {
    resultEl.innerHTML = '<div class="no-match">⚠️ 250문장 중 충분히 일치하는 문장을 찾지 못했습니다 (최대 일치율: ' + Math.round(match.score * 100) + '%).<br>다시 들어보고 입력해보세요.</div>';
    resultEl.classList.add('show');
    return;
  }

  var matchedEn = SENTENCES[match.idx][0];
  var origWords = tokenize(matchedEn);
  var r = diffWords(origWords, userWords);
  var accuracy = origWords.length > 0 ? Math.round((r.lcs / origWords.length) * 100) : 0;
  var sc = accuracy >= 80 ? 'high' : accuracy >= 50 ? 'mid' : 'low';

  var diffHtml = '';
  for (var k = 0; k < r.ops.length; k++) {
    var op = r.ops[k];
    if (op.type === 'match') diffHtml += '<span class="word-correct">' + escapeHtml(op.w) + '</span>';
    else if (op.type === 'missing') diffHtml += '<span class="word-missing">' + escapeHtml(op.w) + '</span>';
    else diffHtml += '<span class="word-wrong">' + escapeHtml(op.w) + '</span>';
  }

  var correctCount = r.ops.filter(function(x) { return x.type === 'match'; }).length;
  var missingCount = r.ops.filter(function(x) { return x.type === 'missing'; }).length;
  var extraCount = r.ops.filter(function(x) { return x.type === 'extra'; }).length;
  var msg = accuracy === 100 ? '🎉 완벽합니다!' : accuracy >= 90 ? '✨ 거의 완벽!' : accuracy >= 70 ? '👍 잘했어요' : accuracy >= 50 ? '💪 조금 더!' : '📚 다시 한 번';

  resultEl.innerHTML =
    '<div class="matched-info">🔍 매칭된 문제: <strong>#' + (match.idx + 1) + '</strong> (250문장 중) · 일치율 ' + Math.round(match.score * 100) + '%</div>' +
    '<div class="result-header">' +
      '<div class="result-title">📊 채점 결과 — ' + msg + '</div>' +
      '<span class="score ' + sc + '">' + accuracy + '점</span>' +
    '</div>' +
    '<div class="diff-label">단어별 비교 (정답 기준)</div>' +
    '<div class="diff-line">' + diffHtml + '</div>' +
    '<div class="stats-line">' +
      '<span>✅ 맞음: <strong>' + correctCount + '</strong>/' + origWords.length + '</span>' +
      '<span>⚠️ 누락: <strong>' + missingCount + '</strong></span>' +
      '<span>❌ 틀림(여분/오타): <strong>' + extraCount + '</strong></span>' +
    '</div>';

  resultEl.classList.add('show');
}

function showAnswer() {
  var userText = document.getElementById('user-input').value.trim();
  var answerEl = document.getElementById('answer-reveal');

  if (lastMatchIdx < 0) {
    if (!userText) {
      alert('먼저 들으신 문장의 일부라도 타이핑하세요. 그러면 정답을 자동으로 찾아드립니다.');
      return;
    }
    var userWords = tokenize(userText);
    if (userWords.length === 0) {
      alert('영어 단어를 입력하세요!');
      return;
    }
    var match = findBestMatch(userWords);
    if (match.score < 0.15) {
      alert('250문장 중 일치하는 문장을 찾을 수 없습니다. 더 많이 적어보세요.');
      return;
    }
    lastMatchIdx = match.idx;
  }

  var matchedEn = SENTENCES[lastMatchIdx][0];
  var matchedKo = SENTENCES[lastMatchIdx][1];
  answerEl.innerHTML =
    '<div class="ar-label">💡 정답 (#' + (lastMatchIdx + 1) + ')</div>' +
    '<div class="answer-en">' + escapeHtml(matchedEn) + '</div>' +
    '<div class="answer-ko">🇰🇷 ' + escapeHtml(matchedKo) + '</div>';
  answerEl.classList.add('show');
  answerEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function clearAll() {
  document.getElementById('user-input').value = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('answer-reveal').classList.remove('show');
  lastMatchIdx = -1;
  document.getElementById('user-input').focus();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-check').addEventListener('click', checkAnswer);
  document.getElementById('btn-answer').addEventListener('click', showAnswer);
  document.getElementById('btn-clear').addEventListener('click', clearAll);

  // Enter triggers 채점, Shift+Enter for newline
  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      checkAnswer();
    }
  });
});
</script>
</body>
</html>
